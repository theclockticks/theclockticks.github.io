    <title>Town of Salem</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" type="image/x-icon"/>
    <link rel="stylesheet" href="css/style.css"/>
    <script type="text/javascript" src="js/jquery.min.js"></script>

    <script type="text/javascript"> 
      if (window.location.href != "https://www.townofsalem.io/TownOfSalem/") {
         window.location.replace("https://www.townofsalem.io/TownOfSalem/");
      }
    </script>

    <!-- Google Analytics -->
    <script>
      window.ga=window.ga||function(){(ga.q=ga.q||[]).push(arguments)};ga.l=+new Date;
      ga('create', 'UA-55514821-1', 'auto');
      ga('send', 'pageview');
    </script>
    <script async="" src="js/analytics.js"></script>
    <!-- End Google Analytics -->
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="100%" height="100%" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="loading_msg">Downloading game...</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      // Function to detect IE or not
      function IEdetection() {
        var ua = window.navigator.userAgent;
        var msie = ua.indexOf('MSIE ');
        if (msie > 0) {
          // IE 10 or older
          return ('IE');
        }
        var trident = ua.indexOf('Trident/');
        if (trident > 0) {
          // IE 11
          return ('IE');
        }
        // User uses other browser
        return ('OK');
      }
      var result = IEdetection();
      if(result=='IE') {
        document.write ('<br><br><h3 style="text-align: center;">Town of Salem is not compatible with Internet Explorer. Please try another browser.</h3>');
        document.execCommand("Stop"); //works in IE to prevent loading any of the rest of the scripts below
      }

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; color:black; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 20000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/ea68ce3f981fe582314c45996aa86ba4.loader.js";
      var config = {
        dataUrl: buildUrl + "/5284c91050b7b346c609f93463f9c7d0.data",
        frameworkUrl: buildUrl + "/61c611a193c8d3992424e22cb5c52c36.framework.js",
        codeUrl: buildUrl + "/ee279db8b4a596454e5a80863c822542.wasm",
        symbolsUrl: buildUrl + "/ca55bdb25543cea396db11334642675f.symbols.json",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "BlankMediaGames",
        productName: "Town of Salem",
        productVersion: "3.3.12",
        showBanner: unityShowBanner,
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;

      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      canvas.style.background = "url('" + buildUrl + "/Web.jpg') center / cover";
      loadingBar.style.display = "block";

      var gameInstance = null;
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                loadingBar.style.display = "none";
                gameInstance = unityInstance;
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  

  <script type="text/javascript">
    window.onbeforeunload = function() {
      // NOTE: Most modern browsers ignore our custom message and replace it with their own.
      return 'You are about to close Town of Salem!';
    }
  </script>

</body></html>
